{{- if .Values.networkPolicy.enabled }}
{{- range .Values.students }}

# POLICY 1: Default deny ALL ingress from outside namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: student-{{ .id }}
  labels:
    owner: student-{{ .id }}
    managed-by: admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---

# POLICY 2: Allow intra-namespace traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: student-{{ .id }}
  labels:
    owner: student-{{ .id }}
    managed-by: admin
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---

{{- if $.Values.networkPolicy.allowDnsEgress }}
# POLICY 3: Allow DNS resolution (kube-dns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: student-{{ .id }}
  labels:
    owner: student-{{ .id }}
    managed-by: admin
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector: {}
---
{{- end }}
{{- end }}
{{- end }}
