apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: student-resource-alerts
  namespace: monitoring
  labels:
    release: monitoring # ต้องตรงกับชื่อ helm release ของนาย
spec:
  groups:
  - name: student.rules
    rules:
    - alert: StudentMemoryUsageHigh
      expr: |
        (
          sum by (namespace) (container_memory_usage_bytes{container!="", namespace=~"student-.*"}) 
          / 
          sum by (namespace) (kube_resourcequota{resource="limits.memory", type="hard", namespace=~"student-.*"})
        ) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Student in {{ `{{` }} $labels.namespace {{ `}}` }} is hitting RAM limit"
        description: "Memory usage is above 80% for more than 5 minutes in {{ `{{` }} $labels.namespace {{ `}}` }}."