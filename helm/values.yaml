students:
  - id: "01"
  - id: "02"

namespace:
  createdBy: "admin"

quota:
  cpuRequest: "250m"           # 25% headroom over 200m actual (rolling-update buffer)
  cpuLimit: "600m"             # 3 students × 600m = 1.8 cores / 8 available
  memoryRequest: "350Mi"       # 25% headroom over 300m actual
  memoryLimit: "600Mi"         # Jupyter 256Mi + Postgres 300Mi = 556Mi; 3×600Mi=1.8GiB fits host
  maxPods: "3"                 # Jupyter + PostgreSQL + Web
  maxDeployments: "2"
  maxServices: "2"          # jupyter-service (NodePort) + postgres-svc (ClusterIP)
  storageRequest: "3Gi"
  maxPVCs: "1"

networkPolicy:
  enabled: true               # set false if CNI doesn't support it (Docker Desktop kindnet)
  allowDnsEgress: true
  allowJupyterPackageDownload: true  # lets pip/conda reach PyPI; postgres pod unaffected

rbac:
  enabled: true

prometheus:
  enabled: true

clusterOps:
  enabled: true
  schedule: "*/5 * * * *"
  cpuIdleThreshold: "0.005"
  prometheusUrl: "http://monitoring-kube-prometheus-prometheus.monitoring:9090"
  image: "alpine/k8s:1.29.9"

limits:
  default:
    cpu: "300m"            # 2 containers × 300m = 600m = quota.cpuLimit
    memory: "256Mi"        # 2 containers × 256Mi = 512Mi = quota.memoryLimit
  defaultRequest:
    cpu: "100m"
    memory: "128Mi"
  max:
    cpu: "300m"            # hard ceiling per individual container
    memory: "300Mi"        # raised so postgres can override to 300Mi
  min:
    cpu: "50m"
    memory: "64Mi"

storage:
  size: "3Gi"
  className: "standard"   # Minikube default storage class

workload:
  enabled: true
  jupyter:
    image: "quay.io/jupyter/base-notebook:2025-01-20"
    port: 8888
  postgres:
    image: "postgres:15-alpine"
    port: 5432
    password: "student123"
