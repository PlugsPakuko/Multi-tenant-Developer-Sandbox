apiVersion: v1
kind: ServiceAccount
metadata:
  name: student-sa
  namespace: student-01
  labels:
    owner: student-01
    managed-by: admin
  annotations:
    description: "Service account for student-01"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: student-role
  namespace: student-01
  labels:
    owner: student-01
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources:  ["pods/exec"]
    verbs: ["create"]

  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: student-rolebinding
  namespace: student-01
  labels:
    owner: student-01
    managed-by: admin
subjects:
  - kind: ServiceAccount
    name: student-sa
    namespace: student-01
roleRef:
  kind: Role
  name: student-role
  apiGroup: rbac.authorization.k8s.io

# ServiceAccount easier to implement for demo purposes, but in production you would likely use a more secure approach such as OIDC or an external identity provider.
# and auth via cluster certificates.